services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexus-frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
    networks:
      - nexus-network
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus-backend
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-nexus}
      - DB_USER=${DB_USER:-nexus_user}
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
    networks:
      - nexus-network
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME:-nexus}
      - POSTGRES_USER=${DB_USER:-nexus_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
    volumes:
      - nexus-db-data:/var/lib/postgresql/data
    networks:
      - nexus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nexus_user} -d ${DB_NAME:-nexus}"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: nexus-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - nexus-network
    depends_on:
      - frontend
      - backend

networks:
  nexus-network:
    driver: bridge

volumes:
  nexus-db-data:
